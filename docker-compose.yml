services:
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
      - /etc/nginx/conf.d
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    depends_on:
      backend:
        condition: service_started
    networks:
      - smartaccess_network
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    # Node config resolves secrets and constructs DATABASE_URL and RABBITMQ_URL internally
    environment:
      - NODE_ENV=production
    secrets:
      - db_password
      - mq_password
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - smartaccess_network
    restart: unless-stopped

  simulator:
    build: ./simulator
    env_file: .env
    environment:
      - SIM_CONNECTION_TOGGLE_PROB=0.25
      - SIM_ALERT_PROB=0.15
      - SIM_TELEMETRY_INTERVAL_MS=3000
    secrets:
      - mq_password
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - smartaccess_network
    restart: unless-stopped

  postgres:
    image: postgres:14
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-smartaccess}
      - POSTGRES_USER=${POSTGRES_USER:-smartaccess}
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    read_only: true
    tmpfs:
      - /var/run/postgresql
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-smartaccess}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smartaccess_network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-smartaccess}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-smartaccess}
    ports:
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    read_only: true
    tmpfs:
      - /var/run/rabbitmq
      - /tmp
      - /var/log/rabbitmq
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1024M
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_running']
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - smartaccess_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    networks:
      - smartaccess_network
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost
        NEXT_PUBLIC_WS_URL: ws://localhost/ws
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost
      - NEXT_PUBLIC_WS_URL=ws://localhost/ws
      - HOSTNAME=0.0.0.0
    # read_only: true
    # tmpfs:
    #   - /app/.next/cache
    #   - /tmp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      - backend
    networks:
      - smartaccess_network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      - backend
    networks:
      - smartaccess_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_password
      - GF_USERS_ALLOW_SIGN_UP=false
    secrets:
      - grafana_password
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - '3001:3000'
    read_only: true
    tmpfs:
      - /var/lib/grafana/csv
      - /var/lib/grafana/png
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 512M
    depends_on:
      - prometheus
    networks:
      - smartaccess_network
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - '16686:16686'   # Jaeger UI
      - '4318:4318'     # OTLP HTTP
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - smartaccess_network
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  smartaccess_network:
    driver: bridge

secrets:
  db_password:
    file: ./secrets/db_password.txt
  mq_password:
    file: ./secrets/mq_password.txt
  grafana_password:
    file: ./secrets/grafana_password.txt
